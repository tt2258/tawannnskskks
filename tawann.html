<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>เรื่องสยอง | ปิดปรับปรุงเว็บไซต์</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', 'Noto Serif Thai', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 50%, #0d0d0d 100%);
            min-height: 100vh;
            color: #e0d6c8;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* พื้นหลัง */
        .horror-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, #1a0a0a 0%, #050505 100%);
            z-index: -2;
        }

        /* กล่องประกาศใหญ่ */
        .announcement-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .announcement-card {
            background: rgba(20, 8, 8, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 60px 30px 60px 30px;
            padding: 50px 40px;
            text-align: center;
            border: 3px solid #8b0000;
            box-shadow: 0 0 60px rgba(139, 0, 0, 0.4);
            animation: borderPulse 2s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: #8b0000; box-shadow: 0 0 30px rgba(139, 0, 0, 0.4); }
            50% { border-color: #ff3333; box-shadow: 0 0 60px rgba(255, 51, 51, 0.6); }
        }

        /* ไอคอน */
        .warning-icon {
            font-size: 5rem;
            color: #8b0000;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out infinite alternate;
        }

        @keyframes shake {
            from { transform: translateX(-5px); }
            to { transform: translateX(5px); }
        }

        .announcement-card h1 {
            font-size: 2.8rem;
            color: #ff3333;
            margin-bottom: 20px;
            font-family: 'Noto Serif Thai', serif;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .announcement-card h2 {
            font-size: 2rem;
            color: #ff6666;
            margin-bottom: 25px;
        }

        .announcement-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #d0c0b0;
            margin-bottom: 30px;
        }

        .announcement-text p {
            margin-bottom: 15px;
        }

        .contact-info {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 25px;
            margin-top: 20px;
            border: 2px dashed #8b0000;
        }

        .contact-info h3 {
            font-size: 1.5rem;
            color: #ff9966;
            margin-bottom: 15px;
        }

        .instagram-link {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            padding: 15px 35px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            transition: transform 0.3s;
            margin-top: 15px;
        }

        .instagram-link:hover {
            transform: scale(1.05);
        }

        .instagram-link i {
            font-size: 2rem;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #5a4a3a;
        }

        /* รองรับมือถือ */
        @media (max-width: 550px) {
            .announcement-card {
                padding: 35px 25px;
            }
            .announcement-card h1 {
                font-size: 2rem;
            }
            .announcement-card h2 {
                font-size: 1.5rem;
            }
            .announcement-text {
                font-size: 1rem;
            }
            .warning-icon {
                font-size: 3.5rem;
            }
            .instagram-link {
                font-size: 1rem;
                padding: 12px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="horror-bg"></div>

    <div class="announcement-container">
        <div class="announcement-card">
            <div class="warning-icon">
                <i class="fas fa-skull"></i>
            </div>
            <h1>⚠️ ปิดให้บริการชั่วคราว ⚠️</h1>
            <h2><i class="fas fa-ghost"></i> เรื่องสยอง <i class="fas fa-ghost"></i></h2>
            
            <div class="announcement-text">
                <p>ทางเว็บขอเรียนแจ้งว่า <strong style="color:#ff6666;">ขณะนี้เว็บปิดตัวลงแล้ว</strong></p>
                <p>เนื่องจากกำลังจะทำเว็บใหม่ขึ้นมา <strong style="color:#ffaa66;">อลังการกว่าเดิม สยองกว่าเดิม!</strong></p>
                <p>ขออภัยในความไม่สะดวกมา ณ ที่นี้ครับ</p>
            </div>

            <div class="contact-info">
                <h3><i class="fas fa-question-circle"></i> หากมีข้อสงสัย</h3>
                <p>ติดต่อสอบถามเพิ่มเติมได้ที่</p>
                <a href="https://instagram.com/ttttt___998on" target="_blank" class="instagram-link">
                    <i class="fab fa-instagram"></i> ttttt___998on
                </a>
                <p style="margin-top: 15px; font-size: 0.85rem; color: #aa8877;">
                    <i class="fas fa-comment"></i> ยินดีให้คำปรึกษาครับ
                </p>
            </div>

            <div class="footer-note">
                <i class="fas fa-heart" style="color: #ff6666;"></i> ขอบคุณที่ติดตามผลงานนะครับ <i class="fas fa-heart" style="color: #ff6666;"></i>
            </div>
        </div>
    </div>
</body>
</html>
